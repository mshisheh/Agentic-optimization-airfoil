<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
  <rect width="1200" height="420" fill="#f8fafc"/>
  <text x="600" y="42" text-anchor="middle" font-size="30" font-family="Arial" fill="#0f172a" font-weight="700">AI Agentic Framework for Airfoil Optimization</text>
  <text x="600" y="72" text-anchor="middle" font-size="18" font-family="Arial" fill="#334155">Objective: Maximize Lift (Cl) • Minimize Drag (Cd)</text>

  <rect x="30" y="120" rx="10" ry="10" width="180" height="90" fill="#e2e8f0" stroke="#64748b"/>
  <text x="120" y="155" text-anchor="middle" font-size="18" font-family="Arial" fill="#0f172a" font-weight="600">Input & Goals</text>
  <text x="120" y="180" text-anchor="middle" font-size="14" font-family="Arial" fill="#334155">Constraints + Targets</text>

  <rect x="260" y="110" rx="12" ry="12" width="170" height="110" fill="#dbeafe" stroke="#2563eb"/>
  <text x="345" y="150" text-anchor="middle" font-size="18" font-family="Arial" fill="#1e3a8a" font-weight="700">Design Agent</text>
  <text x="345" y="176" text-anchor="middle" font-size="13" font-family="Arial" fill="#1e40af">Generate airfoils</text>

  <rect x="460" y="110" rx="12" ry="12" width="170" height="110" fill="#dcfce7" stroke="#16a34a"/>
  <text x="545" y="150" text-anchor="middle" font-size="18" font-family="Arial" fill="#14532d" font-weight="700">Meshing Agent</text>
  <text x="545" y="176" text-anchor="middle" font-size="13" font-family="Arial" fill="#166534">Create CFD mesh</text>

  <rect x="660" y="110" rx="12" ry="12" width="170" height="110" fill="#fef3c7" stroke="#d97706"/>
  <text x="745" y="150" text-anchor="middle" font-size="18" font-family="Arial" fill="#92400e" font-weight="700">Simulation Agent</text>
  <text x="745" y="176" text-anchor="middle" font-size="13" font-family="Arial" fill="#b45309">Run OpenFOAM</text>

  <rect x="860" y="110" rx="12" ry="12" width="170" height="110" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="945" y="150" text-anchor="middle" font-size="18" font-family="Arial" fill="#4c1d95" font-weight="700">Analysis Agent</text>
  <text x="945" y="176" text-anchor="middle" font-size="13" font-family="Arial" fill="#6d28d9">Compute Cl/Cd</text>

  <rect x="1040" y="120" rx="10" ry="10" width="140" height="90" fill="#fee2e2" stroke="#dc2626"/>
  <text x="1110" y="155" text-anchor="middle" font-size="17" font-family="Arial" fill="#7f1d1d" font-weight="700">Decision</text>
  <text x="1110" y="180" text-anchor="middle" font-size="13" font-family="Arial" fill="#991b1b">Refine / Stop</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>

  <line x1="210" y1="165" x2="260" y2="165" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="430" y1="165" x2="460" y2="165" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="630" y1="165" x2="660" y2="165" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="830" y1="165" x2="860" y2="165" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1030" y1="165" x2="1040" y2="165" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <path d="M 1110 220 C 1110 320, 345 320, 345 220" fill="none" stroke="#64748b" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <text x="730" y="343" text-anchor="middle" font-size="16" font-family="Arial" fill="#334155">Iterative optimization loop until criteria are met</text>
</svg>
